name: deployment
run-name: "Deploy ${{ github.event.inputs.tag }}${{ github.event.inputs.push_latest == 'true' && ' (+latest)' || '' }}"

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Docker tag (e.g. v1.0.0)"
                required: true
                type: string
            push_latest:
                description: "Also push :latest"
                required: false
                default: false
                type: boolean
            use_cache_from:
                description: "Use previous GHA cache (cache-from)"
                required: false
                default: true
                type: boolean

jobs:
    docker:
        runs-on: ubuntu-latest
        environment: deployment-secrets
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                  submodules: recursive
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/jupyter:${{ inputs.tag }}
                      ${{ inputs.push_latest && format('{0}/jupyter:latest', secrets.DOCKERHUB_USERNAME) || '' }}
                  no-cache: true
                  cache-to: type=gha,mode=max
                  cache-from: ${{ inputs.use_cache_from && 'type=gha' || '' }}
